<!DOCTYPE html>
<head>
    <style>
      body {
        margin: 0;
        height: 100vh;
      }

      #rect, #rect2 {
        position: absolute;
        width: 100px;
        height: 100px;
        background: rgba(80, 120, 255, 0.25);
        border: 1px solid #333;
        touch-action: none;
        text-align: center;
        user-select: none;
      }

      #rect2 {
        border: 0;
      }

      #rect::after {
        content: "";
        width: 5px;
        height: 5px;
        display: block;
        background-color: red;
        border-radius: 50%;
        position: absolute;
        top: 50%;
        left: 50%;
        transform: translate(-50%, -50%);
      }

      #container {
        width: 50%;
        height: 800px;
        background-color: rgb(127 221 255 / 0.36);
        margin: 0 auto;
        position: relative;
      }

      #dialogues {
        position: absolute;

        max-width: 80%;
        text-align: center;
        white-space: pre-wrap;

        font-size: 26px;
        line-height: 1.3;
        color: #ffffff;
        text-shadow:
                0 0 2px #000,
                0 0 4px #000,
                1px 1px 0 #000,
                -1px -1px 0 #000;

        padding: 4px 8px;
        background-color: #0000004f;
        user-select: none;
      }
    </style>
    <title>1+1=3</title>
</head>
<body>
    <div id="container">
        <div id="rect">Hey now, you're an all star</div>
        <div id="rect2">Get your game on, go play (resize disabled via disableFeatures)</div>
        <div style="height: 40px; width: 40px; background-color: black; position: absolute" id="move-me"></div>
        <div id="dialogues">HAH</div>
    </div>
    <script type="module" src="./main.ts"></script>
</body>
